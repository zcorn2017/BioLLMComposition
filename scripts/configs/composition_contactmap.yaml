# ── Base language models ──────────────────────────────────────────────────
models:
  dna:
    name: "zhihan1996/DNABERT-2-117M"
    short: "dnabert2-117M"
    emb_dim: 768
  protein:
    name: "facebook/esm2_t6_8M_UR50D"
    short: "esm2-8M"
    emb_dim: 320

# ── Data ─────────────────────────────────────────────────────────────────
data:
  data_pt: "/home/zcorn/Projects/proteinDNA_data/processed/embeddings/contactmap_tokens_labels_dna365_prot1024_20260220_150522.pt"

# ── Training ─────────────────────────────────────────────────────────────
training:
  lr: 5.0e-5
  epochs: 100
  batch_size: 16
  num_workers: 4
  n_runs: 1
  seed: 42

# ── Architecture ─────────────────────────────────────────────────────────
architecture:
  head_dim: 64
  num_heads: 20
  target_layers: [0, 3, 5]
  esm_layers: 6

# ── Output ───────────────────────────────────────────────────────────────
output:
  log_dir: "./runs"
  save_dir: "./results"
