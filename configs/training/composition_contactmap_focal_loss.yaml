# ── Composition contact-map training with focal loss ───────────────────────
# Usage:  python scripts/frameworks/composition_contactmap_focal_loss.py \
#             --config configs/training/composition_contactmap_focal_loss.yaml
#
# NOTE: Base model names (DNA / Protein) are read from the data file's
# spec, NOT from this config.  esm_layers is derived from the protein
# model registry entry at runtime.
#
# IMPORTANT: target_layers must be valid for the protein model's layer
# count.  E.g. for esm2-8M (6 layers) use indices 0..5.

framework: "composition"

data:
  # split_pt: "/home/zcorn/Projects/proteinDNA_data/processed/split_dataset/split_group_shuffle_pdb_id_s42_80-10-10_20260316_160604.pt" #ESM-C-600M
  # split_pt: "/home/zcorn/Projects/proteinDNA_data/processed/split_dataset/split_group_shuffle_pdb_id_s42_80-10-10_20260316_181647.pt" #ESM2-150M
  split_pt: "/home/zcorn/Projects/proteinDNA_data/processed/split_dataset/split_group_shuffle_pdb_id_s42_80-10-10_20260319_121910.pt" #NTv3-100M_ESMC-600M

training:
  lr: 5.0e-5
  epochs: 100
  batch_size:  16  # reduced from 16 to avoid OOM with ESM2-650M on ~31 GB GPU
  num_workers: 4
  n_runs: 1
  seed: 42
  warmup_epochs: 5          # linear warmup before cosine decay

loss:
  focal_alpha: 0.95         # positive-class weight (high due to ~0.12% positives)
  focal_gamma: 2.0          # focusing exponent

architecture:
  head_dim: 64
  num_heads: 16  # must divide prot emb_dim: ESM2-650M=1280 (÷16=80), ESM2-3B=2560 (÷16=160)
  target_layers: [0, 5, 10]  # must be < protein model's layer count
  gradient_checkpointing: false  # trade compute for memory (avoids OOM on ~31 GB GPU)

output:
  log_dir:  "./runs"
  save_dir: "./results"
