# ── Precompute: tokenize sequences + pack contact maps ───────────────────
# Usage:  python scripts/00_precompute_tokens_and_labels.py \
#             --config configs/precompute/default-ntv3-100M.yaml
#
# NTv3 uses single-base tokenization (1 token = 1 nucleotide) with no
# CLS/SEP special tokens.  Default embed_mode is first_hidden (see
# biollmcomposition/models/ntv3.py): no DNA length alignment.  Use
# embed_mode "full" in the registry if you need the entire U-Net output.

data_path: "/home/zcorn/Projects/proteinDNA_data/processed/dna_protein_residue_wise_dsdna_20260219.pkl"
out_dir:   "/home/zcorn/Projects/proteinDNA_data/processed/embeddings"

# Short names from the model registry (see biollmcomposition/models/)
models:
  dna: "ntv3-100M"
  protein: "esmc-600M"

# 0 = auto-detect from data
max_dna_len: 0
max_prot_len: 0

seed: 42
