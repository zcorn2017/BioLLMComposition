# Portable conda environment for cluster deployment.
#
# Derived from environment-py314-llm.yml with:
#   - System/NVIDIA libs removed (provided by cluster modules)
#   - PyTorch installed from pip with appropriate CUDA index
#
# Usage:
#   conda env create -f environment-cluster.yml
#   conda activate py314-llm

name: py314-llm
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.15
  - pip
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - --extra-index-url https://pypi.org/simple
      - einops
      - esm
      - huggingface-hub
      - httpx
      - matplotlib
      - numpy
      - pandas
      - pyarrow
      - python-dotenv
      - pyyaml
      - regex
      - requests
      - safetensors
      - scikit-learn
      - scipy
      - optuna
      - optuna-integration
      - wandb
      - tokenizers
      - torch
      - torchvision
      - tqdm
      - transformers==4.48.1
